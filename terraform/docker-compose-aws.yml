services:

  app:
    image: rajasj1996/devops-todo-app:latest
    container_name: todo_app
    restart: unless-stopped
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "5000:5000"
    depends_on:
      - redis
    networks:
      - devops-net

  redis:
    image: redis:7-alpine
    container_name: todo_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - devops-net

  nginx:
    image: nginx:alpine
    container_name: todo_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - devops-net

  prometheus:
    image: prom/prometheus:latest
    container_name: todo_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - devops-net

  grafana:
    image: grafana/grafana:latest
    container_name: todo_grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin123
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - devops-net

  node-exporter:
    image: prom/node-exporter:latest
    container_name: todo_node_exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    networks:
      - devops-net

volumes:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  devops-net:
    driver: bridge
