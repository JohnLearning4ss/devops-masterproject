apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: devops-app
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s

    alerting:
      alertmanagers:
        - static_configs:
            - targets: ["alertmanager:9093"]

    rule_files:
      - /etc/prometheus/alert_rules.yml

    scrape_configs:
      - job_name: "prometheus"
        static_configs:
          - targets: ["localhost:9090"]

      - job_name: "flask_app"
        static_configs:
          - targets: ["todo-app:5000"]
        metrics_path: /metrics

      - job_name: "node_exporter"
        static_configs:
          - targets: ["node-exporter:9100"]
