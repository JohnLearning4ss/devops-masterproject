---
- name: Install Nginx
  apt:
    name: nginx
    state: present
    update_cache: true

- name: Copy Nginx config
  template:
    src: nginx.conf.j2
    dest: /etc/nginx/sites-available/devops-app
    mode: "0644"

- name: Enable site
  file:
    src: /etc/nginx/sites-available/devops-app
    dest: /etc/nginx/sites-enabled/devops-app
    state: link

- name: Remove default site
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent

- name: Restart Nginx
  service:
    name: nginx
    state: restarted
    enabled: true
