services:

  # ── 1. Flask App ─────────────────────────────────────────────────────────────
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: todo_app
    restart: unless-stopped
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "5000:5000"
    depends_on:
      - redis
    networks:
      - devops-net

  # ── 2. Redis (in-memory data store) ──────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: todo_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - devops-net

  # ── 3. Nginx (reverse proxy — sits in front of Flask) ────────────────────────
  nginx:
    image: nginx:alpine
    container_name: todo_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - devops-net

  # ── 4. Prometheus (scrapes /metrics from Flask) ───────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: todo_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - devops-net

  # ── 5. Grafana (dashboard for Prometheus data) ────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: todo_grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin123
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - devops-net

  # ── 6. Node Exporter (host CPU/RAM metrics) ───────────────────────────────────
  node-exporter:
    image: prom/node-exporter:latest
    container_name: todo_node_exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    networks:
      - devops-net

  # ── 7. Alertmanager ───────────────────────────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:latest
    container_name: todo_alertmanager
    restart: unless-stopped
    ports:
      - "9093:9093"
    volumes:
      - ../monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    networks:
      - devops-net

volumes:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  devops-net:
    driver: bridge
